name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  BINARY_NAME: create-godotrs
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
            cross: false
          - name: aarch64-linux
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: tar.gz
            cross: true
          - name: x86_64-darwin
            os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
            cross: false
          - name: aarch64-darwin
            os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
            cross: false
          - name: x86_64-windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Archive Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" "${BINARY_NAME}"

      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\${env:BINARY_NAME}.exe" "dist\${env:BINARY_NAME}.exe"
          Compress-Archive -Path "dist\${env:BINARY_NAME}.exe" -DestinationPath "${env:BINARY_NAME}-${{ github.ref_name }}-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.name }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}

  release-notes:
    name: Release notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract notes
        id: notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"

          if [ -f CHANGELOG.md ]; then
            awk -v version="$version" '
              $0 ~ "^## \\[?" version "\\]?" { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > notes.md
          fi

          if [ ! -s notes.md ]; then
            previous_tag="$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)"
            if [ -n "$previous_tag" ]; then
              git log --oneline "${previous_tag}..${GITHUB_REF_NAME}" > notes.md
            else
              git log --oneline "${GITHUB_REF_NAME}" > notes.md
            fi
          fi

          {
            echo "body<<EOF"
            cat notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build
      - release-notes
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.release-notes.outputs.body }}
          files: dist/**/*
